  # ====================================================================
  # Anthropic endpoints
  # ====================================================================
  /v1/messages:
    post:
      operationId: anthropicMessages
      tags: [Anthropic]
      summary: Create a message
      description: >
        Send a structured conversation and receive an assistant message.  When
        `stream` is true the response is Server-Sent Events following the
        Anthropic streaming protocol (event types: message_start,
        content_block_start, content_block_delta, content_block_stop,
        message_delta, message_stop).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessagesRequest"
      responses:
        "200":
          description: Messages response or SSE stream.
          headers:
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
            text/event-stream:
              schema:
                description: >
                  SSE stream of Anthropic streaming events. Each event has an
                  `event` field (message_start, content_block_start,
                  content_block_delta, content_block_stop, message_delta,
                  message_stop) and a JSON `data` payload.
                type: object
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ====================================================================
  # System endpoints
  # ====================================================================
  /health:
    get:
      operationId: healthCheck
      tags: [System]
      summary: Health check
      description: Returns service health, version, and uptime.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ws:
    get:
      operationId: websocketStream
      tags: [System]
      summary: WebSocket streaming inference
      description: >
        Upgrade to a WebSocket connection for real-time streaming inference.
        The client sends JSON messages with a `type` field (`infer`, `cancel`,
        `ping`).  The server responds with `token`, `error`, `pong`, or
        `complete` messages.


        **Client message types:**

        - `infer` — start inference (fields: model, prompt, images, parameters)

        - `cancel` — cancel the current inference

        - `ping` — keepalive


        **Server message types:**

        - `token` — a generated token (fields: text, id, is_final)

        - `error` — an error occurred (field: message)

        - `pong` — reply to ping

        - `complete` — inference finished (fields: prompt_tokens,
        completion_tokens, total_tokens)
      responses:
        "101":
          description: Switching Protocols (WebSocket upgrade).
