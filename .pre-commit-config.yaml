# Fuse Pre-commit Configuration
# Ensures code quality, security, and prevents sensitive data commits

repos:
  # ============================================
  # General File Checks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: '^(tests/fixtures/|docs/)'
      
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      
      # Ensure files end with a newline
      - id: end-of-file-fixer
        exclude: '\.svg$'
      
      # Trim trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      
      # Check for merge conflicts
      - id: check-merge-conflict
      
      # Check YAML syntax
      - id: check-yaml
        args: ['--safe']
        exclude: '^(k8s/.*\.yaml|\.github/workflows/.*\.yml)$'
      
      # Check TOML syntax
      - id: check-toml
      
      # Check JSON syntax
      - id: check-json
      
      # Detect private keys
      - id: detect-private-key
      
      # Detect AWS credentials
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      
      # Check for symlinks
      - id: check-symlinks
      
      # Check for broken symlinks
      - id: destroyed-symlinks
      
      # Prevent committing to main/master
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

  # ============================================
  # Rust Specific Checks
  # ============================================
  - repo: local
    hooks:
      # Cargo format check
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      
      # Cargo clippy (linter)
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      
      # Cargo check (compilation check)
      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets --all-features
        language: system
        types: [rust]
        pass_filenames: false
      
      # Cargo test (run tests)
      - id: cargo-test
        name: cargo test
        entry: cargo test --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [push]
      
      # Cargo audit (security vulnerabilities)
      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        pass_filenames: false
        stages: [push]

  # ============================================
  # Security Scanning
  # ============================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      # Detect secrets in code
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '^(\.secrets\.baseline|tests/fixtures/|\.pre-commit-config\.yaml)$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      # Detect hardcoded secrets
      - id: gitleaks
        args: ['--verbose', '--no-git']

  # ============================================
  # Code Quality and Formatting
  # ============================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      # Format YAML, JSON, Markdown
      - id: prettier
        types_or: [yaml, json, markdown]
        exclude: '^(Cargo\.lock|\.github/workflows/)'

  # ============================================
  # Documentation Checks
  # ============================================
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      # Markdown linting
      - id: markdownlint
        args: ['--config', '.markdownlint.json']
        exclude: '^(CHANGELOG\.md|\.github/)'

  # ============================================
  # Custom Security Checks
  # ============================================
  - repo: local
    hooks:
      # Check for sensitive patterns
      - id: check-sensitive-patterns
        name: Check for sensitive patterns
        entry: python scripts/check_sensitive_patterns.py
        language: system
        pass_filenames: true
        files: '\.(rs|toml|yaml|yml|json|md)$'
      
      # Validate configuration files
      - id: validate-config
        name: Validate configuration files
        entry: python scripts/validate_config.py
        language: system
        files: 'config\.(toml|yaml|yml)$'
      
      # Check for TODO/FIXME in production code
      - id: check-todos
        name: Check for TODO/FIXME
        entry: python scripts/check_todos.py
        language: system
        types: [rust]
        stages: [push]
      
      # Verify no debug prints
      - id: check-debug-prints
        name: Check for debug prints
        entry: bash -c 'if grep -rn "println!\|dbg!\|eprintln!" --include="*.rs" src/; then echo "Debug prints found!"; exit 1; fi'
        language: system
        types: [rust]
        pass_filenames: false
      
      # Check file permissions
      - id: check-file-permissions
        name: Check file permissions
        entry: python scripts/check_file_permissions.py
        language: system
        pass_filenames: true
      
      # Verify no hardcoded IPs
      - id: check-hardcoded-ips
        name: Check for hardcoded IPs
        entry: bash -c 'if grep -rn "[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}" --include="*.rs" src/ | grep -v "127.0.0.1\|0.0.0.0\|localhost"; then echo "Hardcoded IPs found!"; exit 1; fi'
        language: system
        types: [rust]
        pass_filenames: false
      
      # Check for exposed credentials in config
      - id: check-config-credentials
        name: Check config for credentials
        entry: python scripts/check_config_credentials.py
        language: system
        files: 'config\.(toml|yaml|yml)$'

  # ============================================
  # Dependency Checks
  # ============================================
  - repo: local
    hooks:
      # Check for outdated dependencies
      - id: cargo-outdated
        name: cargo outdated
        entry: cargo outdated --exit-code 1
        language: system
        pass_filenames: false
        stages: [manual]
      
      # Check for unused dependencies
      - id: cargo-udeps
        name: cargo udeps
        entry: cargo +nightly udeps --all-targets
        language: system
        pass_filenames: false
        stages: [manual]

  # ============================================
  # License Checks
  # ============================================
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
      # Ensure license headers
      - id: insert-license
        files: '\.rs$'
        args:
          - --license-filepath
          - LICENSE_HEADER
          - --comment-style
          - //

# ============================================
# Configuration
# ============================================
default_stages: [commit]
fail_fast: false
minimum_pre_commit_version: '2.20.0'
