apiVersion: v1
kind: Service
metadata:
  name: fuse-api
  namespace: fuse-system
  labels:
    app: fuse-api
  annotations:
    # Cilium service annotations
    service.cilium.io/global: "true"
    # Prometheus annotations
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  selector:
    app: fuse-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: fuse-api-headless
  namespace: fuse-system
  labels:
    app: fuse-api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: fuse-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
