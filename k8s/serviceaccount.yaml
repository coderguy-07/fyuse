apiVersion: v1
kind: ServiceAccount
metadata:
  name: fuse-api
  namespace: fuse-system
  labels:
    app: fuse-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fuse-api
  namespace: fuse-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fuse-api
  namespace: fuse-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fuse-api
subjects:
- kind: ServiceAccount
  name: fuse-api
  namespace: fuse-system
